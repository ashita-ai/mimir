services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mimir
      POSTGRES_USER: mimir
      POSTGRES_PASSWORD: mimir
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mimir"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
